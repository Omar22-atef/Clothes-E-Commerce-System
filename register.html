<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Register - Modisch</title>
  <link rel="stylesheet" href="register.css">
  <!-- Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Newsreader:wght@400;500;600&display=swap" rel="stylesheet">

  
</head>

<body>

  <div class="container">

    <div class="card">

      <div class="title">Modisch</div>

      <form id="registerForm">

        <div class="form-group">
          <label class="label">Name</label>
          <input id="name" type="text" class="input">
          <small class="error" id="nameError"></small>
        </div>

        <div class="form-group">
          <label class="label">Email</label>
          <input id="email" type="email" class="input">
          <small class="error" id="emailError"></small>
        </div>

        <div class="form-group">
          <label class="label">Password</label>
          <input id="password" type="password" class="input">
          <small class="error" id="passwordError"></small>
        </div>

        <div class="form-group">
          <label class="label">Confirm Password</label>
          <input id="confirmPassword" type="password" class="input">
          <small class="error" id="confirmPasswordError"></small>
        </div>

        <button class="btn">Create Account</button>

      </form>

      <div class="footer">
        Already have an account?
        <a href="login.html">Login</a>
      </div>

    </div>

  </div>

  
<script src="register.js"></script>
</body>
</html>
