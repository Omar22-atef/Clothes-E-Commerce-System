<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Login - Modisch</title>
  
  <link rel="stylesheet" href="Login.css">
 

  <!-- Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Newsreader:wght@400;500;600&display=swap" rel="stylesheet">

  
</head>

<body>

  <div class="container">

    <div class="card">

      <div class="title">Modisch</div>

      <form id="loginForm">

        <div class="form-group">
          <label class="label">Email</label>
          <input id="email" type="email" class="input" placeholder="Enter your email">
          <small class="error" id="emailError"></small>
        </div>

        <div class="form-group">
          <div class="row">
            <label class="label">Password</label>
            <a href="#" class="link">Forgot?</a>
          </div>

          <input id="password" type="password" class="input" placeholder="Enter your password">
          <small class="error" id="passwordError"></small>
        </div>

        <button class="btn">Login</button>

      </form>

      <div class="footer">
        Do not have an account?
        <a href="register.html">Register</a>
      </div>

    </div>

  </div>

 <script src="Login.js"></script>
</body>
</html>
